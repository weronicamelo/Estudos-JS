<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[url('./img/fundo.png')] bg-cover bg-center flex justify-center min-h-screen">

    <div class="flex flex-col items-center gap-6 mt-60">

        <!-- Título -->
        <h1 class="text-5xl font-bold text-white tracking-wide drop-shadow-lg mb-4">
            Conversor de Moedas
        </h1>

        <!-- Formulário -->
        <div class="bg-white-20 backdrop-blur-md p-6 rounded-xl shadow-lg w-96 border border-white-30">

            <input id="valor" type="number"
                placeholder="Digite o valor"
                class="w-full p-2 border rounded mb-3" />

            <select id="de" class="w-full p-2 border rounded mb-3">
                <option value="" selected disabled>Escolha a moeda de origem</option>
                <option value="USD">USD - Dólar</option>
                <option value="BRL">BRL - Real</option>
                <option value="EUR">EUR - Euro</option>
                <option value="GBP">GBP - Libra</option>
                <option value="JPY">JPY - Iene</option>
                <option value="ARS">ARS - Peso Argentino</option>
            </select>

            <select id="para" class="w-full p-2 border rounded mb-3">
                <option value="" selected disabled>Escolha a moeda de destino</option>
                <option value="BRL">BRL - Real</option>
                <option value="USD">USD - Dólar</option>
                <option value="EUR">EUR - Euro</option>
                <option value="GBP">GBP - Libra</option>
                <option value="JPY">JPY - Iene</option>
                <option value="ARS">ARS - Peso Argentino</option>
            </select>

            <button id="btnConverter"
                class="w-full bg-purple-500 text-white p-2 rounded-lg hover:bg-purple-600 transition duration-300">
                Converter
            </button>

        </div>

        <!-- Caixa de resultado -->
        <div id="resultado" class="hidden bg-white/20 backdrop-blur-md border border-white/30 rounded-xl shadow-lg w-96 p-4 mt-6 text-center text-white text-xl font-semibold min-h-[70px] flex items-center justify-center">
        </div>

    </div>

</body>

    <script src="script.js"></script>

</body>
</html>

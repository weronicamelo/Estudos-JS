<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario com Tailwind</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-gray-100 flex justify-center items-center flex-col">
    <div class="bg-white shadow-md p-8 rounded-lg w-80">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Cadastro</h2>

        <form id="registerForm" class="space-y-4">
            <div id="msg" class="transition-opacity duration-300 opacity-0 text-red-400 text-center"></div>
            <div>
                <label for="name" class="text-sm font-medium text-gray-600 block">Nome</label>
                <input type="text" id="name" placeholder="Digite o seu nome" class="border border-gray-300 mt-1 w-full rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="email" class="text-sm font-medium text-gray-600 block">E-mail</label>
                <input type="email" id="email" placeholder="Digite o seu email" class="border border-gray-300 mt-1 w-full rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" id="submit-button" class="bg-blue-600 w-full text-white py-2 rounded-md cursor-pointer hover:bg-blue-800 transition duration-200">Entrar</button>
        </form>
    </div>

    <div>
        <ul id="items"></ul>
    </div>

   <script src="script.js"></script>
</body>
</html>
